<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horse Race Simulator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            margin-bottom: 10px;
            color: #1a202c;
        }
        .canvas-panel {
            margin-top: 10px;
            margin-bottom: 20px;
        }
        canvas {
            background-color: #2e7d32; /* Grass green track infield */
            border: 4px solid #1b5e20;
            border-radius: 8px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            display: block;
        }
        .controls-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
        }
        #status {
            font-weight: bold;
            margin-top: 15px;
            margin-bottom: 25px;
            color: #4a5568;
            font-size: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        th { background-color: #4a5568; color: white; }
        tr:nth-child(even) { background-color: #f7fafc; }
    </style>
</head>
<body>

    <h1>Horse Race Arena</h1>

    <div class="canvas-panel">
        <canvas id="race-canvas" width="1200" height="800"></canvas>
    </div>

    <div id="player-panel">
        <!-- shown when no token in localStorage -->
        <div id="join-box">
            <input id="name-input" placeholder="Your name">
            <button id="join-btn">Join</button>
        </div>
        <!-- shown when we have a token -->
        <div id="wallet" style="display:none;">
            <strong id="player-name"></strong> — balance: $<span id="balance"></span>
        </div>
    </div>

    <div class="controls-panel">
        <div id="status">Loading track layout...</div>

        <table id="results-table" style="display: none;">
            <thead><tr></tr></thead>
            <tbody id="results-body"></tbody>
        </table>
    </div>

    <script>
        'use strict';

        // ================= DOM handles =================
        const canvas = document.getElementById('race-canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const table = document.getElementById('results-table');
        const tableHeadRow = table.querySelector('thead tr');
        const tableBody = document.getElementById('results-body');

        // ================= colors =================
        // Every renderer colors by LANE — the one identity that never
        // changes across betting table, canvas, and results table.
        const HORSE_COLORS = ["#e53e3e", "#3182ce", "#38a169", "#dd6b20",
                              "#805ad5", "#00b5d8", "#d69e2e", "#ed64a6"];

        function colorForLane(lane) {
            return HORSE_COLORS[lane % HORSE_COLORS.length];
        }

        function colorDot(lane) {
            return `<span style="display:inline-block; width:12px; height:12px;
                background:${colorForLane(lane)}; border-radius:50%;
                margin-right:8px; vertical-align:middle;"></span>`;
        }

        // ================= track rendering =================
        let trackLanes = {};
        let SCALE = 1.0;
        let OFFSET_X = 0;
        let OFFSET_Y = 0;

        function worldToScreen(wx, wy) {
            return { x: wx * SCALE + OFFSET_X, y: -wy * SCALE + OFFSET_Y };
        }

        function calculateTrackBounds() {
            const xs = [];
            const ys = [];
            Object.values(trackLanes).forEach(polyline => {
                polyline.forEach(([x, y]) => {
                    xs.push(x);
                    ys.push(y);
                });
            });

            const min_x = Math.min(...xs);
            const max_x = Math.max(...xs);
            const min_y = Math.min(...ys);
            const max_y = Math.max(...ys);

            const track_width_m = max_x - min_x;
            const track_height_m = max_y - min_y;

            SCALE = Math.min((canvas.width * 0.9) / track_width_m,
                             (canvas.height * 0.9) / track_height_m);

            OFFSET_X = canvas.width / 2 - (min_x + track_width_m / 2) * SCALE;
            OFFSET_Y = canvas.height / 2 + (min_y + track_height_m / 2) * SCALE;

            console.log(`[Renderer] Scale set to: ${SCALE.toFixed(3)} px/m`);
        }

        async function initTrack() {
            try {
                const resp = await fetch('/track');
                if (!resp.ok) throw new Error(`HTTP error! Status: ${resp.status}`);

                trackLanes = await resp.json();
                calculateTrackBounds();
                drawTrackOnly();
                statusDiv.textContent = "Track loaded. Ready to race!";
            } catch (err) {
                console.error("Error fetching track data:", err);
                statusDiv.textContent = "Error loading track framework.";
            }
        }

        function drawTrackOnly() {
            ctx.fillStyle = "#2e7d32";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            Object.values(trackLanes).forEach(polyline => {
                if (!polyline || polyline.length === 0) return;

                ctx.beginPath();
                ctx.lineWidth = 1.5;
                ctx.strokeStyle = "rgba(255, 255, 255, 0.85)";

                const start = worldToScreen(polyline[0][0], polyline[0][1]);
                ctx.moveTo(start.x, start.y);
                for (let i = 1; i < polyline.length; i++) {
                    const pt = worldToScreen(polyline[i][0], polyline[i][1]);
                    ctx.lineTo(pt.x, pt.y);
                }
                ctx.closePath();   // lanes are loops — seal the seam
                ctx.stroke();
            });
        }

        // ================= player =================
        let playerToken = localStorage.getItem('token');
        let playerName  = localStorage.getItem('name');

        async function joinGame() {
            const name = document.getElementById('name-input').value.trim();
            if (!name) return;
            const resp = await fetch('/player', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            
            if (resp.status === 409) {
                alert("Name taken");
                return;
            }
            
            const player = await resp.json();
            
            // 1. save token + name to localStorage

            localStorage.setItem('token', player.token);
            localStorage.setItem('name', player.name);

            // 2. set playerToken/playerName

            playerToken = player.token;
            playerName  = player.name;

            // 3. call showWallet(player.balance)

            showWallet(player.balance);
        }

        function showWallet(balance) {
            document.getElementById('join-box').style.display = 'none';

            const wallet = document.getElementById('wallet');
            wallet.style.display = 'block';

            document.getElementById('player-name').textContent = playerName;
            document.getElementById('balance').textContent = balance.toFixed(2);
        }

        async function refreshBalance() {
            if (!playerToken) return;
            const resp = await fetch('/player/balance', {
                headers: { 'Authorization': `Bearer ${playerToken}` }
            });
            if (resp.status === 401) {
                // token is dead (e.g. you deleted race.db) 
                localStorage.removeItem('token');
                localStorage.removeItem('name');
                return;
            }

            if (!resp.ok) {                 // anything else unexpected
                console.error("[Balance] unexpected status:", resp.status);
                return;
            }
            
            const wallet = await resp.json();

            showWallet(wallet.balance);
        }

        async function placeBet(lane) {
            const amount = 100;   // fixed stake for now — input field later
            const resp = await fetch('/bet', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    token: playerToken,
                    race_id: currentRaceId,
                    lane: lane,
                    amount: amount
                })
            });
            // status branches, same pattern as pollForReplay:
            // 402 -> "not enough funds", 409 -> "betting closed",
            // 200 -> update the balance display from new_balance

            if (resp.status === 402) {
                alert("Not enough funds");
                return;
            }

            if (resp.status === 409) {
                alert("Betting closed");
                return;
            }

            if (!resp.ok) {
                alert("Bet failed");
                return;
            }

            const data = await resp.json();

            // Update wallet balance
            showWallet(data.new_balance);
        }

        // ================= replay =================
        let raceResults = null;    // results array from /race/{id}/replay
        let raceStart = null;      // ms timestamp of the first replay frame
        let maxFinishTime = 0;     // replay ends when the slowest horse finishes

        function interpolate(history, t) {
            if (!history || history.length === 0) return null;

            if (t <= history[0][2]) {
                return [history[0][0], history[0][1]];
            }
            if (t >= history[history.length - 1][2]) {
                return [history[history.length - 1][0], history[history.length - 1][1]];
            }

            let lo = 0;
            let hi = history.length - 1;
            while (hi - lo > 1) {
                const mid = Math.floor((lo + hi) / 2);
                if (history[mid][2] <= t) {
                    lo = mid;
                } else {
                    hi = mid;
                }
            }

            const [x0, y0, t0] = history[lo];
            const [x1, y1, t1] = history[hi];
            if (t1 === t0) return [x0, y0];

            const frac = (t - t0) / (t1 - t0);
            return [x0 + frac * (x1 - x0), y0 + frac * (y1 - y0)];
        }

        function drawHorses(playbackTime) {
            raceResults.forEach(result => {
                const pos = interpolate(result.history, playbackTime);
                if (pos === null) return;

                const pt = worldToScreen(pos[0], pos[1]);

                ctx.beginPath();
                ctx.arc(pt.x, pt.y, 6, 0, Math.PI * 2);
                ctx.fillStyle = colorForLane(result.lane);
                ctx.fill();

                ctx.fillStyle = "white";
                ctx.font = "12px Arial";
                ctx.fillText(result.horse, pt.x + 9, pt.y - 9);
            });
        }

        function frame(now) {
            if (raceStart === null) raceStart = now;
            const playbackTime = (now - raceStart) / 1000;

            drawTrackOnly();
            drawHorses(playbackTime);

            if (playbackTime <= maxFinishTime) {
                requestAnimationFrame(frame);
            } else {
                buildResultsTable(raceResults);
                refreshBalance();
                statusDiv.textContent = "Race completed! The results are shown below.";
                setTimeout(lifecycleLoop, 5000);
            }
        }

        function startReplay(results) {
            raceResults = results;
            raceStart = null;
            maxFinishTime = results[results.length - 1].final_time;
            requestAnimationFrame(frame);
        }

        // ================= tables =================
        function buildResultsTable(results) {
            tableHeadRow.innerHTML = `<th>Place</th><th>Horse</th><th>Total Time</th>`;
            tableBody.innerHTML = results.map((result, index) => `
                <tr>
                    <td><strong>#${index + 1}</strong></td>
                    <td>${colorDot(result.lane)}<strong>${result.horse}</strong></td>
                    <td>${result.final_time.toFixed(2)}s</td>
                </tr>
            `).join('');
            table.style.display = "table";
        }

        function buildBettingTable(horses) {
            tableHeadRow.innerHTML = `<th>Lane</th><th>Horse Spec Sheet</th><th>Current Payout Odds</th><th>Bet</th>`;
            tableBody.innerHTML = horses.map(horse => `
                <tr>
                    <td>${colorDot(horse.lane)}Lane ${horse.lane}</td>
                    <td><strong>${horse.name}</strong> (Spd: ${horse.base_speed} | Stm: ${horse.stamina})</td>
                    <td>${horse.odds.toFixed(1)}x</td>
                    <td><button class="bet-btn" data-lane="${horse.lane}">Bet $100</button></td>
                </tr>
            `).join('');

            tableBody.querySelectorAll('.bet-btn').forEach(btn => {
                btn.addEventListener('click', () => placeBet(Number(btn.dataset.lane)));
            });

            table.style.display = "table";
        }

        // ================= lifecycle =================
        let currentRaceId = null;

        async function lifecycleLoop() {
            try {
                const resp = await fetch('/race/current');

                if (resp.status === 404) {
                    statusDiv.textContent = "Next race starting soon...";
                    setTimeout(lifecycleLoop, 2000);
                    return;
                }

                const race = await resp.json();
                currentRaceId = race.race_id;

                buildBettingTable(race.horses);
                startCountdown(race.seconds_left);
            } catch (err) {
                console.error("[Lifecycle Error]:", err);
                statusDiv.textContent = "Arena connection error. Retrying in 3s...";
                setTimeout(lifecycleLoop, 3000);
            }
        }

        function startCountdown(secondsLeft) {
            const startedAt = performance.now();   // duration clock, immune to wall-clock skew
            function tick() {
                const elapsed = (performance.now() - startedAt) / 1000;
                const left = secondsLeft - elapsed;
                if (left > 0) {
                    statusDiv.textContent = `Betting closes in ${left.toFixed(0)}s`;
                    setTimeout(tick, 250);
                } else {
                    statusDiv.textContent = "Betting closed";
                    pollForReplay();
                }
            }
            tick();
        }

        async function pollForReplay() {
            try {
                const resp = await fetch(`/race/${currentRaceId}/replay`);

                if (resp.status === 425) {          // not revealed yet
                    setTimeout(pollForReplay, 1000);
                    return;
                }
                if (resp.status === 404) {          // race vanished — start over
                    lifecycleLoop();
                    return;
                }
                if (resp.status === 200) {
                    const data = await resp.json();
                    startReplay(data.results);
                }
            } catch (err) {
                console.error("[Poll for Replay Error]:", err);
                statusDiv.textContent = "Arena connection error. Retrying in 3s...";
                setTimeout(pollForReplay, 3000);
            }
        }

        // ================= boot =================
        document.getElementById('join-btn').addEventListener('click', joinGame);
        refreshBalance()
        initTrack();
        lifecycleLoop();
    </script>

</body>
</html>
