<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horse Race Simulator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            margin-bottom: 10px;
            color: #1a202c;
        }
        .canvas-panel {
            margin-top: 10px;
            margin-bottom: 20px;
        }
        canvas {
            background-color: #2e7d32; /* Grass green track infield */
            border: 4px solid #1b5e20;
            border-radius: 8px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            display: block;
        }
        .controls-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
        }
        button {
            padding: 14px 40px;
            font-size: 18px;
            cursor: pointer;
            background-color: #2b6cb0;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s;
        }
        button:hover { background-color: #1a4971; }
        #status { 
            font-weight: bold; 
            margin-top: 15px;
            margin-bottom: 25px; 
            color: #4a5568; 
            font-size: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        th { background-color: #4a5568; color: white; }
        tr:nth-child(even) { background-color: #f7fafc; }
    </style>
</head>
<body>

    <h1>Horse Race Arena</h1>
    
    <div class="canvas-panel">
        <canvas id="race-canvas" width="1200" height="800"></canvas>
    </div>

    <div class="controls-panel">
        <div id="status">Loading track layout...</div>

        <table id="results-table" style="display: none;">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Horse</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="results-body"></tbody>
        </table>
    </div>

        <script>
        'use strict';

        const canvas = document.getElementById('race-canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const table = document.getElementById('results-table');
        const tableBody = document.getElementById('results-body');


        let trackLanes = {}; 
        
        let SCALE = 1.0;
        let OFFSET_X = 0;
        let OFFSET_Y = 0;

        function worldToScreen(wx, wy) {
            const sx = wx * SCALE + OFFSET_X;
            const sy = -wy * SCALE + OFFSET_Y;
            return { x: sx, y: sy };
        }

        // Compute bounds by iterating through the values of the direct JSON dictionary
        function calculateTrackBounds() {
            let xs = [];
            let ys = [];

            Object.values(trackLanes).forEach(polyline => {
                polyline.forEach(([x, y]) => {
                    xs.push(x);
                    ys.push(y);
                });
            });

            const min_x = Math.min(...xs);
            const max_x = Math.max(...xs);
            const min_y = Math.min(...ys);
            const max_y = Math.max(...ys);

            const track_width_m = max_x - min_x;
            const track_height_m = max_y - min_y;

            const scale_x = (canvas.width * 0.9) / track_width_m;
            const scale_y = (canvas.height * 0.9) / track_height_m;

            SCALE = Math.min(scale_x, scale_y);

            OFFSET_X = canvas.width / 2 - (min_x + track_width_m / 2) * SCALE;
            OFFSET_Y = canvas.height / 2 + (min_y + track_height_m / 2) * SCALE;

            console.log(`[Renderer] Scale set to: ${SCALE.toFixed(3)} px/m`);
        }

        async function initTrack() {
            try {
                const response = await fetch('/track');
                if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
                
                trackLanes = await response.json(); 
                
                calculateTrackBounds();
                statusDiv.textContent = "Track loaded. Ready to race!";
                drawTrackOnly();
            } catch (err) {
                console.error("Error fetching track data:", err);
                statusDiv.textContent = "Error loading track framework.";
            }
        }

        function drawTrackOnly() {
            ctx.fillStyle = "#2e7d32";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            Object.values(trackLanes).forEach(polyline => {
                if (!polyline || polyline.length === 0) return;

                ctx.beginPath();
                ctx.lineWidth = 1.5;
                ctx.strokeStyle = "rgba(255, 255, 255, 0.85)"; 

                const [firstX, firstY] = polyline[0];
                const startPt = worldToScreen(firstX, firstY);
                ctx.moveTo(startPt.x, startPt.y);

                for (let i = 1; i < polyline.length; i++) {
                    const [wx, wy] = polyline[i];
                    const pt = worldToScreen(wx, wy);
                    ctx.lineTo(pt.x, pt.y);
                }
                
                ctx.closePath();
                ctx.stroke();
            });
        }

                // ============ replay state ============
        const HORSE_COLORS = ["#e53e3e", "#3182ce", "#38a169", "#dd6b20",
                            "#805ad5", "#00b5d8", "#d69e2e", "#ed64a6"];

        let raceResults = null;    // the results array from the last /race response
        let raceStart   = null;    // ms timestamp of the frame the replay began
        let maxFinishTime = 0;     // when the replay is over (slowest horse)

        function interpolate(history, t) {
            if (!history || history.length === 0) return null;

            if (t <= history[0][2]) {
                return [history[0][0], history[0][1]]; 
            }

            if (t >= history[history.length-1][2]) {
                return [history[history.length-1][0], history[history.length-1][1]];
            }

            let lo = 0;
            let hi = history.length - 1;
            while (hi - lo > 1) 
            {
                const mid = Math.floor((lo + hi) / 2);
                if (history[mid][2] <= t) {
                    lo = mid;
                } else {
                    hi = mid;
                }
            }

            const [x0, y0, t0] = history[lo];
            const [x1, y1, t1] = history[hi];

            if (t1 === t0) 
            {
                return [x0, y0];
            }


            const frac = (t - t0) / (t1 - t0)
            return [x0 + frac * (x1 - x0), y0 + frac * (y1 - y0)]
        }

        function drawHorses(playbackTime) {
            raceResults.forEach((result, i) => {

                const pos = interpolate(result.history, playbackTime);
                if (pos === null) {
                    return;
                }

                const [x, y] = pos;
                const pt = worldToScreen(x, y);

                ctx.beginPath();
                ctx.arc(pt.x, pt.y, 6, 0, Math.PI * 2);   // a 6px dot
                ctx.fillStyle = HORSE_COLORS[i % HORSE_COLORS.length];
                ctx.fill();

                // Then the name label next to the dot:
                ctx.fillStyle = "white";
                ctx.font = "12px Arial";
                ctx.fillText(result.horse, pt.x + 9, pt.y - 9);
            });
        }

        function buildResultsTable(results) {
            tableBody.innerHTML = ''; // Clear previous results

            const headRow = table.querySelector("thead tr");
            headRow.innerHTML = `<th>Place</th><th>Horse</th><th>Total Time</th>`;

            results.forEach((result, index) => {
                // Find the original horse to get its lane and color index
                const originalHorseIdx = currentRaceHorses.findIndex(h => h.name === result.horse);
                const laneNumber = originalHorseIdx !== -1 ? currentRaceHorses[originalHorseIdx].lane : "?";
                const horseColor = originalHorseIdx !== -1 ? HORSE_COLORS[originalHorseIdx % HORSE_COLORS.length] : "#718096";

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>#${index + 1}</strong></td>
                    <td>
                        <span style="display:inline-block; width:12px; height:12px; background:${horseColor}; border-radius:50%; margin-right:8px; vertical-align:middle;"></span>
                        <strong>${result.horse}</strong>
                    </td>
                    <td>${result.final_time.toFixed(2)}s</td>
                `;
                tableBody.appendChild(row);
            });

            table.style.display = "table";
        }

        function frame(now) {
            if (raceStart === null) raceStart = now;
            const playbackTime = (now - raceStart) / 1000;

            drawTrackOnly();
            drawHorses(playbackTime);

            if (playbackTime <= maxFinishTime) {
                requestAnimationFrame(frame);        // race still running → next frame
            } else {
                buildResultsTable(raceResults);
                statusDiv.textContent = "Race completed! The results are shown below.";

                setTimeout(lifecycleLoop, 5000);
            }
        }

        function startReplay(results) {
            raceResults = results;
            raceStart = null;
            maxFinishTime = results[results.length - 1].final_time;
            requestAnimationFrame(frame);
        }


                // ============ lifecycle state ============
        let currentRaceId = null;
        let currentRaceHorses = []; // Added to store horse details for color cross-referencing

        async function lifecycleLoop() {
            try {
                const resp = await fetch('/race/current');

                if (resp.status === 404) {
                    statusDiv.textContent = "Next race starting soon...";                    
                    setTimeout(lifecycleLoop, 2000);
                    return;
                }

                const race = await resp.json();
                currentRaceId = race.race_id;
                currentRaceHorses = race.horses;

                table.style.display = "table";
                const headRow = table.querySelector("thead tr");
                headRow.innerHTML = `<th>Lane</th><th>Horse Spec Sheet</th><th>Current Payout Odds</th>`;
                
                tableBody.innerHTML = race.horses.map((horse, idx) => `
                    <tr>
                        <td>
                            <span style="display:inline-block; width:12px; height:12px; background:${HORSE_COLORS[idx % HORSE_COLORS.length]}; border-radius:50%; margin-right:5px; vertical-align:middle;"></span>
                            Lane ${horse.lane}
                        </td>
                        <td><strong>${horse.name}</strong> (Spd: ${horse.base_speed} | Stm: ${horse.stamina})</td>
                        <td>${horse.odds.toFixed(1)}x</td>
                    </tr>
                `).join('');


                startCountdown(race.seconds_left);   // hands off; countdown calls back

            } catch (err) {
                console.error("[Lifecycle Error]:", err);
                statusDiv.textContent = "Arena connection error. Retrying in 3s...";
                setTimeout(lifecycleLoop, 3000);
            }
        }

        function startCountdown(secondsLeft) {
            const startedAt = performance.now();     // duration-measuring clock
            function tick() {
                const elapsed = (performance.now() - startedAt) / 1000;
                const left = secondsLeft - elapsed;
                if (left > 0) {
                    statusDiv.textContent = `Betting closes in ${left.toFixed(0)}s`;
                    setTimeout(tick,250);

                } else {
                    statusDiv.textContent = "Betting closed";
                    pollForReplay();
                }
            }
            tick();
        }

        async function pollForReplay() {
            try {

                const resp = await fetch(`/race/${currentRaceId}/replay`);

                if (resp.status === 425) {
                    setTimeout(pollForReplay,1000);
                    return 
                }

                if (resp.status === 404) {
                    lifecycleLoop();
                    return 
                }

                if (resp.status === 200) {
                    const data = await resp.json();
                    startReplay(data.results)
                }

            } catch (err) {
                console.error("[Poll for Replay Error]:", err);
                statusDiv.textContent = "Arena connection error. Retrying in 3s...";
                setTimeout(pollForReplay, 3000);
            }
        }

        initTrack();
        lifecycleLoop();

    </script>

</body>
</html>
